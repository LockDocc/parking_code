<div class="card">
  <div class="section-title" style="margin-top:0;">
    <h2>Cadastrar mensalista</h2>
    <span class="badge blue">Plano mensal</span>
  </div>
  <div class="field" id="fieldMPlaca">
  <label>Placa</label>
  <input id="mPlaca" type="text" placeholder="ABC-1234 ou ABC1D23" />
  <div class="hint">Use um formato válido</div>
  <div class="error" id="mPlacaErro">Placa inválida.</div>
</div>

    <div class="field">
      <label>Nome</label>
      <input id="mNome" type="text" placeholder="Nome do cliente" />
    </div>
    <div class="field">
      <label>Telefone</label>
      <input id="mTelefone" type="text" placeholder="(xx) xxxxx-xxxx" />
    </div>
    <div class="field">
      <label>Validade</label>
      <input id="mValidade" type="date" />
    </div>
  </div>

  <div class="toolbar" style="margin-top:14px;">
    <div class="left">
      <span class="badge gray">Se já existir, atualiza</span>
    </div>
    <div class="right">
      <button class="btn" id="btnLimparMensalista">Limpar</button>
      <button class="btn primary" id="btnSalvarMensalista">Salvar Mensalista</button>
    </div>
  </div>
</div>

<div class="section-title">
  <h2>Lista de mensalistas</h2>
  <span class="badge gray">Buscar e gerenciar</span>
</div>

<div class="toolbar">
  <div class="left search">
    <div class="field" style="width:100%;">
      <input id="mensalistaBusca" type="text" placeholder="Buscar por placa ou nome..." />
    </div>
  </div>
  <div class="right">
    <button class="btn" id="btnBuscarMensalista">Buscar</button>
    <button class="btn" id="btnLimparFiltroMensalista">Limpar filtro</button>
  </div>
</div>

<table class="table">
  <thead>
    <tr>
      <th>Placa</th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Validade</th>
      <th>Status</th>
      <th class="actions">Ações</th>
    </tr>
  </thead>
  <tbody id="mensalistasBody"></tbody>
</table>
