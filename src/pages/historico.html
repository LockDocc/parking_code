<div class="card">
  <div class="section-title" style="margin-top:0;">
    <h2>Filtros</h2>
    <span class="badge gray">Refine o histórico</span>
  </div>

  <div class="form" style="grid-template-columns:repeat(4,minmax(180px,1fr));">
    <div class="field">
      <label>Data inicial</label>
      <input id="hIni" type="date" />
    </div>
    <div class="field">
      <label>Data final</label>
      <input id="hFim" type="date" />
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="hTipo">
        <option value="">Todos</option>
        <option>Avulso</option>
        <option>Mensalista</option>
      </select>
    </div>
    <div class="field">
      <label>Placa</label>
      <input id="hPlaca" type="text" placeholder="Opcional" />
    </div>
  </div>

  <div class="toolbar" style="margin-top:14px;">
    <div class="left">
      <span class="badge gray">MVP: sem exportação ainda</span>
    </div>
    <div class="right">
      <button class="btn" id="btnLimparFiltroHistorico">Limpar</button>
      <button class="btn primary" id="btnAplicarFiltroHistorico">Aplicar</button>
    </div>
  </div>
</div>

<div class="section-title">
  <h2>Movimentações finalizadas</h2>
  <span class="badge gray">Registros</span>
</div>

<table class="table">
  <thead>
    <tr>
      <th>Placa</th>
      <th>Entrada</th>
      <th>Saída</th>
      <th>Tempo</th>
      <th>Tipo</th>
      <th>Valor</th>
    </tr>
  </thead>
  <tbody id="historicoBody"></tbody>
</table>
